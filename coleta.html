<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coleta de Pragas — Agrinho 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f1f8e9; margin:0; padding:24px; color:#333 }
        header { text-align:center; margin-bottom:18px }
        header h1 { margin-bottom:8px; color:#2e7d32 }
        header p { margin:0; opacity:0.9 }
        .status { max-width:900px; margin:0 auto 20px; display:flex; flex-wrap:wrap; justify-content:space-between; gap:12px; background:#e8f5e9; border:1px solid #c8e6c9; border-radius:12px; padding:18px }
        .status div { font-weight:700; color:#2e7d32 }
        .field { position:relative; max-width:980px; margin:0 auto; border-radius:16px; overflow:hidden; box-shadow:0 18px 40px rgba(0,0,0,0.12); }
        .field img { width:100%; display:block; height:auto; filter:brightness(0.94) saturate(1.05); }
        .field::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at top left, rgba(255,255,255,0.15), transparent 22%), radial-gradient(circle at bottom right, rgba(0,0,0,0.08), transparent 20%); pointer-events:none; }
        .pest { position:absolute; width:38px; height:16px; border-radius:999px; border:2px solid rgba(255,255,255,0.92); background:linear-gradient(90deg, #53310f 16%, #8d5a22 52%, #53310f 84%); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; text-align:center; transition:transform 0.16s ease, filter 0.16s ease, opacity 0.2s ease; box-shadow:0 10px 18px rgba(0,0,0,0.18); }
        .pest::before { content: ''; position:absolute; width:6px; height:6px; border-radius:50%; background:#f2ce8f; left:8px; top:4px; }
        .pest::after { content: ''; position:absolute; width:4px; height:4px; border-radius:50%; background:rgba(255,255,255,0.25); right:7px; top:5px; }
        .pest:hover { transform:scale(1.3); filter:brightness(1.28); }
        .pest.collected { background:#8bc34a; border-color:#edf7e8; opacity:0.95; cursor:default; box-shadow:none; }
        .hint { max-width:980px; margin:14px auto 0; text-align:center; color:#2e7d32; font-weight:600; }
        .actions { max-width:980px; margin:22px auto 0; text-align:center; display:flex; flex-wrap:wrap; justify-content:center; gap:12px }
        .btn { background:#43a047; color:#fff; border:0; padding:14px 22px; border-radius:10px; cursor:pointer; font-size:1rem; min-width:180px }
        .btn:disabled { background:#9e9e9e; cursor:not-allowed }
        .secondary { background:#fff; color:#2e7d32; border:2px solid #2e7d32 }
    </style>
</head>
<body>
    <header>
        <h1>Simulação de Coleta — Encontre as pragas no milho</h1>
        <p>Toque nas lagartas escondidas na plantação e colete as amostras para levar ao laboratório.</p>
    </header>

    <div class="status">
        <div>Amostras coletadas: <span id="count">0</span></div>
        <div>Lagartas detectadas: <span id="remaining">6</span></div>
    </div>

    <main>
        <div class="field">
            <img src="images/user-corn.jpg" alt="Área de milho para coleta" />
            <div id="pests"></div>
        </div>

        <div class="hint" id="hint">Procure as lagartas entre as folhas e clique nos símbolos para coletar as amostras.</div>

        <div class="actions">
            <button id="go-lab" class="btn" onclick="goLab()" disabled>Ir para o Laboratório</button>
            <button class="btn secondary" onclick="resetGame()">Reiniciar Coleta</button>
        </div>
    </main>

    <script>
        const totalPests = 6;
        const collected = new Set();
        const countEl = document.getElementById('count');
        const remainingEl = document.getElementById('remaining');
        const hintEl = document.getElementById('hint');
        const goLabBtn = document.getElementById('go-lab');
        const pestsContainer = document.getElementById('pests');
        let movingPests = [];
        let animationFrameId = null;

        function updateUI() {
            countEl.textContent = collected.size;
            remainingEl.textContent = totalPests - collected.size;
            goLabBtn.disabled = collected.size === 0;
            if (collected.size === totalPests) {
                hintEl.textContent = 'Parabéns! Todas as pragas foram coletadas. Agora leve as amostras ao laboratório.';
            } else if (collected.size > 0) {
                hintEl.textContent = 'Continue coletando. Você ainda tem pragas na plantação.';
            } else {
                hintEl.textContent = 'Procure as lagartas entre as folhas e clique nos símbolos para coletar as amostras.';
            }
        }

        function createPest(id, top, left) {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'pest';
            button.dataset.id = id;
            button.style.top = top;
            button.style.left = left;
            button.style.transform = 'translate(-50%, -50%)';
            button.setAttribute('aria-label', 'Lagarta ' + id);
            button.addEventListener('click', () => collectPest(button));
            return button;
        }

        function initPests() {
            const pestPositions = [
                { id: 1, y: 18, x: 22 },
                { id: 2, y: 30, x: 54 },
                { id: 3, y: 42, x: 70 },
                { id: 4, y: 54, x: 28 },
                { id: 5, y: 68, x: 40 },
                { id: 6, y: 60, x: 75 }
            ];
            pestsContainer.innerHTML = '';
            movingPests = pestPositions
                .sort(() => Math.random() - 0.5)
                .map(pos => {
                    const el = createPest(pos.id, pos.y + '%', pos.x + '%');
                    pestPositions;
                    pestsContainer.appendChild(el);
                    return {
                        el,
                        x: pos.x,
                        y: pos.y,
                        vx: (Math.random() * 0.08 - 0.04),
                        vy: (Math.random() * 0.08 - 0.04)
                    };
                });
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            animatePests();
        }

        function collectPest(button) {
            const id = button.dataset.id;
            if (collected.has(id)) return;
            collected.add(id);
            button.classList.add('collected');
            button.textContent = '✔';
            button.disabled = true;
            movingPests = movingPests.filter(p => p.el !== button);
            updateUI();
        }

        function animatePests() {
            movingPests.forEach(pest => {
                pest.x += pest.vx;
                pest.y += pest.vy;
                if (pest.x < 10) { pest.x = 10; pest.vx *= -1; }
                if (pest.x > 90) { pest.x = 90; pest.vx *= -1; }
                if (pest.y < 12) { pest.y = 12; pest.vy *= -1; }
                if (pest.y > 86) { pest.y = 86; pest.vy *= -1; }
                pest.el.style.left = pest.x + '%';
                pest.el.style.top = pest.y + '%';
                pest.el.style.transform = `translate(-50%, -50%) rotate(${Math.sin(pest.x + pest.y) * 15}deg)`;
                if (Math.random() < 0.01) {
                    pest.vx = (Math.random() * 0.1 - 0.05);
                    pest.vy = (Math.random() * 0.1 - 0.05);
                }
            });
            animationFrameId = requestAnimationFrame(animatePests);
        }

        function resetGame() {
            collected.clear();
            initPests();
            updateUI();
        }

        function goLab() {
            if (collected.size === 0) return;
            const ids = Array.from(collected).join(',');
            location.href = 'laboratorio.html?samples=' + encodeURIComponent(ids);
        }

        initPests();
        updateUI();
    </script>
</body>
</html>
